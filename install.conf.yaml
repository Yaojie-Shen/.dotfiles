- defaults:
    link:
      create: true
      relink: true

- shell:
    - command: |
        if [ -s "$HOME/.oh-my-zsh/oh-my-zsh.sh" ]; then
          printf 'Oh-My-Zsh already installed at %s, skipping.\n' "$HOME/.oh-my-zsh"
        elif [ -e "$HOME/.oh-my-zsh" ]; then
          printf 'Warning: %s exists but does not look like a complete Oh-My-Zsh install. Please repair or remove it before rerunning install.\n' "$HOME/.oh-my-zsh" >&2
          exit 1
        else
          sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)" "" --unattended
        fi
      description: ">>> Oh-My-Zsh"
      quiet: true
    - command: |
        if [ -s "$HOME/.zplug/init.zsh" ]; then
          printf 'Zplug already installed at %s, skipping.\n' "$HOME/.zplug"
        elif [ -e "$HOME/.zplug" ]; then
          printf 'Warning: %s exists but does not look like a complete Zplug install. Please repair or remove it before rerunning install.\n' "$HOME/.zplug" >&2
          exit 1
        else
          curl -sL --proto-redir -all,https https://raw.githubusercontent.com/zplug/installer/master/installer.zsh | zsh
        fi
      description: ">>> Zplug"
      quiet: true
    - command: |
        if [ -s "$HOME/.bash_it/bash_it.sh" ]; then
          printf 'Bash-it already installed at %s, skipping.\n' "$HOME/.bash_it"
        elif [ -e "$HOME/.bash_it" ]; then
          printf 'Warning: %s exists but does not look like a complete Bash-it install. Please repair or remove it before rerunning install.\n' "$HOME/.bash_it" >&2
          exit 1
        else
          git clone --depth=1 https://github.com/Bash-it/bash-it.git "$HOME/.bash_it" &&
          printf "\nplugins tmux git history-search history-substring-search autojump gitstatus history alias-completion\n" >> "$HOME/.bash_it/profiles/default.bash_it" &&
          "$HOME/.bash_it/install.sh" --no-modify-config
        fi
      description: ">>> Bash-it"
      quiet: true

- clean: [ '~' ]

- create:
    - persistent/codex/sessions
    - persistent/codex/archived_sessions
    - persistent/Downloads
    - persistent/Projects
    - persistent/autojump

- link:
    ~/.dotfiles:
      path: ""
      if: '[ ! -e "$HOME/.dotfiles" ] || [ -L "$HOME/.dotfiles" ]'
    ~/.zshrc:
      path: zshrc
      backup: true
      force: true
    ~/.bashrc:
      path: bashrc
      backup: true
      force: true
    ~/.codex/sessions:
      path: persistent/codex/sessions
      if: '[ ! -e "$HOME/.codex/sessions" ] || [ -L "$HOME/.codex/sessions" ]'
    ~/.codex/archived_sessions:
      path: persistent/codex/archived_sessions
      if: '[ ! -e "$HOME/.codex/archived_sessions" ] || [ -L "$HOME/.codex/archived_sessions" ]'
    ~/.condarc:
    ~/.tmux.conf:
    ~/.persistent:
    ~/.shell:
    ~/.devbox:
    ~/Downloads:
      path: persistent/Downloads
      if: '[ ! -e "$HOME/Downloads" ] || [ -L "$HOME/Downloads" ]'
    ~/Projects:
      path: persistent/Projects
      if: '[ ! -e "$HOME/Projects" ] || [ -L "$HOME/Projects" ]'
    ~/.local/share/autojump: # Cached path db for autojump
      path: persistent/autojump
      if: '[ "$(uname -s)" = "Linux" ]'
    ~/.config/nvim: nvim
